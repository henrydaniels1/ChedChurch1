
<style>
  #gw { background:#020b18; border-radius:16px; padding:16px 10px; position:relative; overflow:hidden; }
  @keyframes spinGlobe { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes spinSlow { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
  @keyframes dashFlow { to{stroke-dashoffset:-24} }
  @keyframes orb { from{transform:rotate(var(--s)) translateX(198px) rotate(calc(-1*var(--s)))} to{transform:rotate(calc(var(--s) + 360deg)) translateX(198px) rotate(calc(-1*var(--s) - 360deg))} }
  @keyframes scanline { 0%{transform:translateY(-200px)} 100%{transform:translateY(200px)} }
  @keyframes ripple { 0%{r:6;opacity:0.8} 100%{r:18;opacity:0} }
  .spin-grid { animation:spinGlobe 22s linear infinite; transform-origin:340px 265px; }
  .spin-slow  { animation:spinSlow 38s linear infinite; transform-origin:340px 265px; }
  .flow-line  { stroke-dasharray:6 6; animation:dashFlow 1.2s linear infinite; }
  .orb1 { animation:orb 9s linear infinite; transform-origin:340px 265px; --s:0deg; }
  .orb2 { animation:orb 13s linear infinite reverse; transform-origin:340px 265px; --s:72deg; }
  .orb3 { animation:orb 7s linear infinite; transform-origin:340px 265px; --s:144deg; }
  .scan { animation:scanline 3.5s linear infinite; }
  .ripple  { animation:ripple 2s ease-out infinite; }
  .ripple2 { animation:ripple 2s ease-out infinite 0.65s; }
</style>

<div id="gw">
<svg width="100%" viewBox="0 0 680 530" role="img">
  <title>Tech globe with location pins</title>
  <desc>Animated globe with grid lines, orbiting satellites and city pin markers</desc>
  <defs>
    <clipPath id="gc"><circle cx="340" cy="265" r="192"/></clipPath>
    <radialGradient id="gbg" cx="36%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#0d2a5e"/>
      <stop offset="60%" stop-color="#061430"/>
      <stop offset="100%" stop-color="#020b18"/>
    </radialGradient>
    <radialGradient id="shine" cx="32%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="340" cy="265" r="192" fill="url(#gbg)"/>

  <g clip-path="url(#gc)">
    <g class="spin-grid" stroke="#1B3A8C" stroke-width="0.5" fill="none" opacity="0.5">
      <ellipse cx="340" cy="265" rx="192" ry="50"/>
      <ellipse cx="340" cy="265" rx="192" ry="100"/>
      <ellipse cx="340" cy="265" rx="192" ry="150"/>
      <ellipse cx="340" cy="265" rx="192" ry="192"/>
      <ellipse cx="340" cy="265" rx="50"  ry="192"/>
      <ellipse cx="340" cy="265" rx="100" ry="192"/>
      <ellipse cx="340" cy="265" rx="150" ry="192"/>
      <line x1="148" y1="265" x2="532" y2="265"/>
      <line x1="340" y1="73"  x2="340" y2="457"/>
    </g>
    <g class="spin-slow" stroke="#C9A84C" stroke-width="0.4" fill="none" opacity="0.18">
      <ellipse cx="340" cy="265" rx="192" ry="70" transform="rotate(30 340 265)"/>
      <ellipse cx="340" cy="265" rx="192" ry="70" transform="rotate(60 340 265)"/>
      <ellipse cx="340" cy="265" rx="192" ry="70" transform="rotate(90 340 265)"/>
      <ellipse cx="340" cy="265" rx="192" ry="70" transform="rotate(120 340 265)"/>
      <ellipse cx="340" cy="265" rx="192" ry="70" transform="rotate(150 340 265)"/>
    </g>

    <path class="flow-line" d="M230,235 Q290,210 350,260 Q400,300 440,230" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
    <path class="flow-line" d="M310,220 Q330,240 390,265 Q430,280 460,228" fill="none" stroke="#1B3A8C" stroke-width="0.8" opacity="0.9" style="animation-delay:-0.6s"/>
    <path class="flow-line" d="M200,240 Q240,260 280,258 Q310,256 350,260" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.5" style="animation-delay:-1s"/>

    <g class="scan" opacity="0.05">
      <rect x="148" y="265" width="384" height="2" fill="#C9A84C"/>
    </g>
  </g>

  <circle cx="340" cy="265" r="192" fill="url(#shine)"/>
  <circle cx="340" cy="265" r="192" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
  <circle cx="340" cy="265" r="192" fill="none" stroke="#1B3A8C" stroke-width="3" opacity="0.3"/>

  <ellipse cx="340" cy="265" rx="215" ry="58" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-dasharray="5 8" opacity="0.4"/>
  <ellipse cx="340" cy="265" rx="225" ry="40" fill="none" stroke="#1B3A8C" stroke-width="0.6" stroke-dasharray="3 10" opacity="0.35" transform="rotate(-20 340 265)"/>

  <g class="orb1"><circle cx="340" cy="265" r="5" fill="#C9A84C"/><circle cx="340" cy="265" r="2.5" fill="#fff" opacity="0.9"/></g>
  <g class="orb2"><circle cx="340" cy="265" r="4" fill="#C9A84C" opacity="0.85"/><circle cx="340" cy="265" r="2" fill="#fff" opacity="0.8"/></g>
  <g class="orb3"><circle cx="340" cy="265" r="3.5" fill="#C9A84C" opacity="0.7"/><circle cx="340" cy="265" r="1.8" fill="#fff" opacity="0.7"/></g>

  <g id="pin-lagos">
    <circle class="ripple"  cx="230" cy="270" r="6" fill="none" stroke="#E8441A" stroke-width="1.2"/>
    <circle class="ripple2" cx="230" cy="270" r="6" fill="none" stroke="#E8441A" stroke-width="1"/>
    <path d="M230,258 C226,258 222,261.5 222,265.5 C222,270.5 230,278 230,278 C230,278 238,270.5 238,265.5 C238,261.5 234,258 230,258 Z" fill="#E8441A"/>
    <circle cx="230" cy="265.5" r="2.5" fill="#fff"/>
    <text x="230" y="293" text-anchor="middle" font-family="monospace" font-size="9" fill="#C9A84C" letter-spacing="1">LAGOS</text>
  </g>

  <g id="pin-london">
    <circle class="ripple"  cx="358" cy="208" r="6" fill="none" stroke="#E8441A" stroke-width="1.2" style="animation-delay:0.5s"/>
    <circle class="ripple2" cx="358" cy="208" r="6" fill="none" stroke="#E8441A" stroke-width="1" style="animation-delay:1.15s"/>
    <path d="M358,196 C354,196 350,199.5 350,203.5 C350,208.5 358,216 358,216 C358,216 366,208.5 366,203.5 C366,199.5 362,196 358,196 Z" fill="#E8441A"/>
    <circle cx="358" cy="203.5" r="2.5" fill="#fff"/>
    <text x="358" y="231" text-anchor="middle" font-family="monospace" font-size="9" fill="#C9A84C" letter-spacing="1">LONDON</text>
  </g>

  <g id="pin-dubai">
    <circle class="ripple"  cx="430" cy="238" r="6" fill="none" stroke="#E8441A" stroke-width="1.2" style="animation-delay:1s"/>
    <circle class="ripple2" cx="430" cy="238" r="6" fill="none" stroke="#E8441A" stroke-width="1" style="animation-delay:1.65s"/>
    <path d="M430,226 C426,226 422,229.5 422,233.5 C422,238.5 430,246 430,246 C430,246 438,238.5 438,233.5 C438,229.5 434,226 430,226 Z" fill="#E8441A"/>
    <circle cx="430" cy="233.5" r="2.5" fill="#fff"/>
    <text x="430" y="261" text-anchor="middle" font-family="monospace" font-size="9" fill="#C9A84C" letter-spacing="1">DUBAI</text>
  </g>

  <g id="pin-ny">
    <circle class="ripple"  cx="210" cy="228" r="6" fill="none" stroke="#E8441A" stroke-width="1.2" style="animation-delay:1.5s"/>
    <circle class="ripple2" cx="210" cy="228" r="6" fill="none" stroke="#E8441A" stroke-width="1" style="animation-delay:2.15s"/>
    <path d="M210,216 C206,216 202,219.5 202,223.5 C202,228.5 210,236 210,236 C210,236 218,228.5 218,223.5 C218,219.5 214,216 210,216 Z" fill="#E8441A"/>
    <circle cx="210" cy="223.5" r="2.5" fill="#fff"/>
    <text x="210" y="251" text-anchor="middle" font-family="monospace" font-size="9" fill="#C9A84C" letter-spacing="1">NEW YORK</text>
  </g>
</svg>
</div>
